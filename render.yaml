services:
  - type: web
    name: resuno-backend
    runtime: node
    rootDir: Backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GOOGLE_GENAI_API_KEY
        sync: false
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: COOKIE_SAME_SITE
        value: none
      - key: COOKIE_SECURE
        value: 'true'
